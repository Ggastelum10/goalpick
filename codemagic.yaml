workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - goalpick
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.goalpick
    scripts:
      - name: Diagnostic
        script: |
          echo "=== Testing app-store-connect access ==="
          app-store-connect bundle-ids list || echo "Failed to list bundle ids"
          echo "=== Bundle id done ==="
          app-store-connect certificates list || echo "Failed to list certs"
          echo "=== Certs done ==="
          app-store-connect profiles list || echo "Failed to list profiles"
          echo "=== Profiles done ==="
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
    artifacts:
      - build/ios/ipa/*.ipa
