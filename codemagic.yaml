workflows:
  ios-workflow:
    name: iOS Workflow
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - goalpick
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.goalpick
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect bundle-ids register "Goalpick" --bundle-id "app.goalpick" --platform IOS || true
          app-store-connect certificates create --type IOS_DISTRIBUTION --save || true
          app-store-connect profiles create --bundle-id "app.goalpick" --type IOS_APP_STORE --save
          app-store-connect fetch-signing-files "app.goalpick" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
