workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      xcode: latest
      cocoapods: default
      groups:
        - goalpick
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up signing
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          echo $PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/goalpick.mobileprovision
          echo $CERTIFICATE_PEM | base64 --decode > /tmp/goalpick.pem
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/goalpick.key
          openssl pkcs12 -export \
            -inkey /tmp/goalpick.key \
            -in /tmp/goalpick.pem \
            -out /tmp/goalpick.p12 \
            -passout pass:Goalpick2026
          security create-keychain -p Goalpick2026 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p Goalpick2026 build.keychain
          security import /tmp/goalpick.p12 -k build.keychain -P Goalpick2026 -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k Goalpick2026 build.keychain
      - name: Build iOS
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Goalpick AppStore" \
            DEVELOPMENT_TEAM=UFU24UHH5V \
            archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath build/output
    artifacts:
      - build/output/*.ipa
    publishing:
      app_store_connect:
        apple_id: gustavo.gastelum10@gmail.com
        password: $APP_SPECIFIC_PASSWORD
        submit_to_testflight: false
