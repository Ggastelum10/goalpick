name: Build Android (APK + AAB)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - 'vite.config.ts'
      - 'index.html'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Android app name to Goalpick
        run: |
          STRINGS=android/app/src/main/res/values/strings.xml
          sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">Goalpick</string>|' "$STRINGS"
          sed -i 's|<string name="title_activity_main">[^<]*</string>|<string name="title_activity_main">Goalpick</string>|' "$STRINGS"
          cat "$STRINGS"

      - name: Generate launcher icons from Goalpick logo
        run: |
          LOGO=src/assets/goalpick-logo-v2.png
          RES=android/app/src/main/res
          declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          declare -A FG_SIZES=( [mdpi]=108 [hdpi]=162 [xhdpi]=216 [xxhdpi]=324 [xxxhdpi]=432 )
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "$RES/mipmap-$d"
            S=${SIZES[$d]}
            FG=${FG_SIZES[$d]}
            INNER=$((FG * 66 / 100))
            convert "$LOGO" -resize ${S}x${S} -background none -gravity center -extent ${S}x${S} \
              "$RES/mipmap-$d/ic_launcher.png"
            convert "$LOGO" -resize ${S}x${S} -background none -gravity center -extent ${S}x${S} \
              \( +clone -threshold -1 -negate -fill white -draw "circle $((S/2)),$((S/2)) $((S/2)),0" \) \
              -alpha off -compose CopyOpacity -composite \
              "$RES/mipmap-$d/ic_launcher_round.png"
            convert "$LOGO" -resize ${INNER}x${INNER} -background none -gravity center -extent ${FG}x${FG} \
              "$RES/mipmap-$d/ic_launcher_foreground.png"
          done
          mkdir -p "$RES/values"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="ic_launcher_background">#0B1F12</color>' \
            '</resources>' > "$RES/values/ic_launcher_background.xml"
          mkdir -p "$RES/mipmap-anydpi-v26"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
            '    <background android:drawable="@color/ic_launcher_background"/>' \
            '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' \
            '</adaptive-icon>' > "$RES/mipmap-anydpi-v26/ic_launcher.xml"
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Set version code/name
        run: |
          GRADLE=android/app/build.gradle
          VC=${{ github.run_number }}
          sed -i "s/versionCode [0-9]\+/versionCode ${VC}/" "$GRADLE"
          sed -i 's/versionName "[^"]*"/versionName "1.0.'"${VC}"'"/' "$GRADLE"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: goalpick-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Check release signing secrets
        id: signing
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KP: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KA: ${{ secrets.ANDROID_KEY_ALIAS }}
          KW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KS" ] && [ -n "$KP" ] && [ -n "$KA" ] && [ -n "$KW" ]; then
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "::notice::Release AAB skipped — add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD as GitHub secrets to enable Play Store builds."
          fi

      - name: Decode keystore
        if: steps.signing.outputs.has_keystore == 'true'
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KS" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        if: steps.signing.outputs.has_keystore == 'true'
        env:
          KP: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KA: ${{ secrets.ANDROID_KEY_ALIAS }}
          KW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$KP
          keyAlias=$KA
          keyPassword=$KW
          EOF
          python3 - <<'PY'
          import re
          p='android/app/build.gradle'
          s=open(p).read()
          if 'signingConfigs {' not in s:
              inject = (
                  "\n    signingConfigs {\n"
                  "        release {\n"
                  "            def kp = new Properties()\n"
                  "            def f = rootProject.file('key.properties')\n"
                  "            if (f.exists()) { kp.load(new FileInputStream(f)) }\n"
                  "            storeFile file(kp['storeFile'] ?: 'release.keystore')\n"
                  "            storePassword kp['storePassword']\n"
                  "            keyAlias kp['keyAlias']\n"
                  "            keyPassword kp['keyPassword']\n"
                  "        }\n"
                  "    }\n"
              )
              s = re.sub(r'(android\s*\{)', r'\1' + inject, s, count=1)
              s = re.sub(r'(buildTypes\s*\{\s*release\s*\{)', r'\1\n            signingConfig signingConfigs.release', s, count=1)
              open(p,'w').write(s)
          PY
          cat android/app/build.gradle

      - name: Build release AAB
        if: steps.signing.outputs.has_keystore == 'true'
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload release AAB
        if: steps.signing.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: goalpick-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "## Build Result" >> $GITHUB_STEP_SUMMARY
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            SIZE=$(du -h android/app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "- Debug APK built ($SIZE) — see **goalpick-debug-apk** artifact" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            SIZE=$(du -h android/app/build/outputs/bundle/release/app-release.aab | cut -f1)
            echo "- Release AAB built ($SIZE) — see **goalpick-release-aab** artifact (upload to Play Console)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Release AAB not built (signing secrets not configured)." >> $GITHUB_STEP_SUMMARY
          fi
