<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOALPICK - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.7;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #f8fafc;
    }
    p {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    button {
      background: #1e3a5f;
      color: #f8fafc;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #2a4a72; }
    .brand {
      font-size: 0.875rem;
      color: #475569;
      margin-top: 3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1 id="title">You're offline</h1>
    <p id="desc">Check your internet connection and try again.</p>
    <button id="retry" onclick="window.location.reload()">Try Again</button>
    <div class="brand">GOALPICK</div>
  </div>
  <script>
    if (navigator.language && navigator.language.startsWith('es')) {
      document.getElementById('title').textContent = 'Estás sin conexión';
      document.getElementById('desc').textContent = 'Revisa tu conexión a internet e inténtalo de nuevo.';
      document.getElementById('retry').textContent = 'Reintentar';
    }
    window.addEventListener('online', function() { window.location.reload(); });
  </script>
</body>
</html>
