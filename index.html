    <!--
      Pre-paint theme script — applies the user's theme choice (or dark default)
      before React mounts so the first paint never flashes the wrong theme.
      See mem://design/theme-system-green-dark-first.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('theme');
          // Brand defaults to dark; only 'light' opts out.
          var isDark = stored !== 'light';
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // localStorage may be blocked (Safari private mode, etc.) — fall back to dark.
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
